name: Build Desktop App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore SushiScan.sln
      
    - name: Build Desktop App (Release)
      run: dotnet build SushiScan.Desktop/SushiScan.Desktop.csproj --configuration Release --no-restore
      
    - name: Publish Desktop App (Windows x64)
      run: dotnet publish SushiScan.Desktop/SushiScan.Desktop.csproj --configuration Release --runtime win-x64 --self-contained true --output ./publish/win-x64
      
    - name: Publish Desktop App (Windows x86)
      run: dotnet publish SushiScan.Desktop/SushiScan.Desktop.csproj --configuration Release --runtime win-x86 --self-contained true --output ./publish/win-x86
      
    - name: Upload Windows x64 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SushiScan-Desktop-Windows-x64
        path: ./publish/win-x64/
        retention-days: 30
        
    - name: Upload Windows x86 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SushiScan-Desktop-Windows-x86
        path: ./publish/win-x86/
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore SushiScan.sln
      
    - name: Build Desktop App (Release)
      run: dotnet build SushiScan.Desktop/SushiScan.Desktop.csproj --configuration Release --no-restore
      
    - name: Publish Desktop App (Linux x64)
      run: dotnet publish SushiScan.Desktop/SushiScan.Desktop.csproj --configuration Release --runtime linux-x64 --self-contained true --output ./publish/linux-x64
      
    - name: Upload Linux x64 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SushiScan-Desktop-Linux-x64
        path: ./publish/linux-x64/
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore SushiScan.sln
      
    - name: Build Desktop App (Release)
      run: dotnet build SushiScan.Desktop/SushiScan.Desktop.csproj --configuration Release --no-restore
      
    - name: Publish Desktop App (macOS x64)
      run: dotnet publish SushiScan.Desktop/SushiScan.Desktop.csproj --configuration Release --runtime osx-x64 --self-contained true --output ./publish/osx-x64
      
    - name: Publish Desktop App (macOS ARM64)
      run: dotnet publish SushiScan.Desktop/SushiScan.Desktop.csproj --configuration Release --runtime osx-arm64 --self-contained true --output ./publish/osx-arm64
      
    - name: Upload macOS x64 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SushiScan-Desktop-macOS-x64
        path: ./publish/osx-x64/
        retention-days: 30
        
    - name: Upload macOS ARM64 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SushiScan-Desktop-macOS-ARM64
        path: ./publish/osx-arm64/
        retention-days: 30
