name: Build and Release SushiScan

on:
  push:
    tags:
      - 'V*'  # Déclenché uniquement sur les tags de version (ex: v1.0.0)
  workflow_dispatch:  # Permet de déclencher manuellement

env:
  DOTNET_VERSION: '9.0'
  JAVA_VERSION: '21'

jobs:
  build-desktop:
    runs-on: windows-latest
    name: Build Desktop (Windows/Linux/macOS)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore SushiScan.sln
      
    - name: Build Windows Desktop
      run: |
        dotnet publish SushiScan.Desktop/SushiScan.Desktop.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=true `
          -o ./publish/windows
          
    - name: Build Linux Desktop
      run: |
        dotnet publish SushiScan.Desktop/SushiScan.Desktop.csproj `
          -c Release `
          -r linux-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=true `
          -o ./publish/linux
          
    - name: Build macOS Desktop
      run: |
        dotnet publish SushiScan.Desktop/SushiScan.Desktop.csproj `
          -c Release `
          -r osx-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=true `
          -o ./publish/macos
          
    - name: Create Desktop Archives
      run: |
        # Windows
        Compress-Archive -Path "./publish/windows/*" -DestinationPath "./SushiScan-Windows-x64.zip"
        
        # Linux (utilise tar via WSL ou PowerShell Core)
        tar -czf "./SushiScan-Linux-x64.tar.gz" -C "./publish/linux" .
        
        # macOS
        tar -czf "./SushiScan-macOS-x64.tar.gz" -C "./publish/macos" .
        
    - name: Upload Desktop Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: desktop-builds
        path: |
          ./SushiScan-Windows-x64.zip
          ./SushiScan-Linux-x64.tar.gz
          ./SushiScan-macOS-x64.tar.gz

  build-android:
    runs-on: windows-latest
    name: Build Android APK
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'microsoft'
        
    - name: Install .NET MAUI Workload
      run: dotnet workload install maui-android
      
    - name: Restore dependencies
      run: dotnet restore SushiScan.sln
      
    - name: Build Android APK
      run: |
        dotnet publish SushiScan.Android/SushiScan.Android.csproj `
          -c Release `
          -f net8.0-android `
          -p:AndroidSdkDirectory="${env:ANDROID_HOME}" `
          -p:JavaSdkDirectory="${env:JAVA_HOME}" `
          -o ./publish/android
          
    - name: Find and rename APK
      run: |
        $apkFile = Get-ChildItem -Path "./publish/android" -Filter "*.apk" -Recurse | Select-Object -First 1
        if ($apkFile) {
          Copy-Item $apkFile.FullName "./SushiScan-Android.apk"
          Write-Host "APK trouvé et copié: $($apkFile.FullName)"
        } else {
          Write-Error "Aucun fichier APK trouvé"
          exit 1
        }
        
    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-build
        path: ./SushiScan-Android.apk

  build-ios:
    runs-on: macos-latest
    name: Build iOS IPA
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Install .NET MAUI Workload
      run: dotnet workload install maui-ios
      
    - name: Restore dependencies
      run: dotnet restore SushiScan.sln
      
    - name: Build iOS (sans signature pour release publique)
      run: |
        dotnet build SushiScan.iOS/SushiScan.iOS.csproj \
          -c Release \
          -f net8.0-ios \
          -p:RuntimeIdentifier=ios-arm64 \
          -p:MtouchArch=ARM64 \
          -p:CodesignKey="" \
          -p:CodesignProvision="" \
          -p:IpaPackageDir="./publish/ios/"
          
    - name: Find and rename IPA
      run: |
        find ./publish/ios -name "*.ipa" -exec cp {} ./SushiScan-iOS.ipa \;
        if [ ! -f "./SushiScan-iOS.ipa" ]; then
          echo "Aucun fichier IPA trouvé, création d'un placeholder"
          echo "Build iOS nécessite une configuration de signature" > ./SushiScan-iOS-unsigned.txt
        fi
        
    - name: Upload iOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: |
          ./SushiScan-iOS.ipa
          ./SushiScan-iOS-unsigned.txt
        if-no-files-found: warn

  create-release:
    needs: [build-desktop, build-android, build-ios]
    runs-on: ubuntu-latest
    name: Create GitHub Release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
        
    - name: Prepare release files
      run: |
        mkdir -p ./release-files
        
        # Desktop builds
        if [ -d "./artifacts/desktop-builds" ]; then
          cp ./artifacts/desktop-builds/* ./release-files/
        fi
        
        # Android build
        if [ -d "./artifacts/android-build" ]; then
          cp ./artifacts/android-build/* ./release-files/
        fi
        
        # iOS build
        if [ -d "./artifacts/ios-build" ]; then
          cp ./artifacts/ios-build/* ./release-files/
        fi
        
        # Afficher les fichiers qui seront inclus dans la release
        echo "Fichiers à inclure dans la release:"
        ls -la ./release-files/
        
    - name: Get version from tag
      id: get_version
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION="dev-$(date +'%Y%m%d-%H%M%S')"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
        
    - name: Generate release notes
      id: release_notes
      run: |
        cat > release_notes.md << 'EOF'
        # SushiScan ${{ steps.get_version.outputs.version }}
        
        ## 📱 Plateformes supportées
        
        ### 🖥️ Desktop
        - **Windows x64**: `SushiScan-Windows-x64.zip`
        - **Linux x64**: `SushiScan-Linux-x64.tar.gz`
        - **macOS x64**: `SushiScan-macOS-x64.tar.gz`
        
        ### 📱 Mobile
        - **Android**: `SushiScan-Android.apk`
        - **iOS**: `SushiScan-iOS.ipa` (nécessite une installation via TestFlight ou signature manuelle)
        
        ## 🚀 Installation
        
        ### Desktop
        1. Téléchargez l'archive correspondant à votre système
        2. Extrayez le contenu
        3. Lancez l'exécutable `SushiScan` (ou `SushiScan.exe` sur Windows)
        
        ### Android
        1. Téléchargez le fichier APK
        2. Autorisez l'installation d'applications tierces si nécessaire
        3. Installez l'APK
        
        ### iOS
        1. Le fichier IPA nécessite une signature de développeur ou TestFlight
        2. Contactez les développeurs pour obtenir une version signée
        
        ## 📝 Notes de version
        - Application de lecture de mangas/scans
        - Interface moderne avec Avalonia UI
        - Support multi-plateformes
        - Cache local des images
        - Navigation fluide entre chapitres
        
        ---
        
        **Build automatisé le**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
        **Commit**: ${{ github.sha }}
        EOF
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: "SushiScan ${{ steps.get_version.outputs.version }}"
        body_path: release_notes.md
        files: ./release-files/*
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.version, 'dev') || contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
